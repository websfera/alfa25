<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row h-100">
            <!-- Seznam kontaktů -->
            <div class="col-md-3 bg-light border-end p-0">
                <div class="p-3 border-bottom">
                    <h5>Kontakty</h5>
                </div>
                <div id="contactList" class="overflow-auto" style="height: calc(100vh - 70px);">
                    <!-- Kontakty se načtou JavaScriptem -->
                </div>
            </div>

            <!-- Konverzace -->
            <div class="col-md-9 d-flex flex-column p-0">
                <div class="p-3 border-bottom bg-white">
                    <h5 id="chatTitle">Vyberte kontakt</h5>
                </div>

                <div id="messageContainer" class="flex-grow-1 p-3 overflow-auto">
                    <!-- Zprávy se načtou JavaScriptem -->
                </div>

                <div class="p-3 border-top bg-white">
                    <form id="messageForm" class="d-flex gap-2">
                        <input type="text" id="messageInput" class="form-control" placeholder="Napište zprávu..." required>
                        <button type="submit" class="btn btn-primary">Odeslat</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/messenger.js"></script>
</body>
</html>
