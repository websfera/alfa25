<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger – Registrace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Navigace -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">💬 Messenger</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Domů</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">O aplikaci</a></li>
                    <li class="nav-item"><a class="nav-link" href="developer.html">O vývojáři</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Kontakt</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <a href="login.html" class="btn btn-outline-light">Přihlásit se</a>
                    <a href="register.html" class="btn btn-light text-primary fw-semibold">Registrovat</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Formulář -->
    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card shadow border-0">
                        <div class="card-body p-4">
                            <h3 class="card-title text-center mb-1">Registrace</h3>
                            <p class="text-center text-muted small mb-4">Vytvořte si nový účet zdarma</p>
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="username" class="form-label">Uživatelské jméno</label>
                                    <input type="text" class="form-control" id="username" placeholder="Zvolte přezdívku" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="email" placeholder="vas@email.cz" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Heslo</label>
                                    <input type="password" class="form-control" id="password" placeholder="Minimálně 8 znaků" required>
                                </div>
                                <div class="mb-4">
                                    <label for="passwordConfirm" class="form-label">Potvrdit heslo</label>
                                    <input type="password" class="form-control" id="passwordConfirm" placeholder="Zopakujte heslo" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Zaregistrovat se</button>
                            </form>
                            <div class="text-center mt-3">
                                <span class="text-muted small">Již máte účet?</span>
                                <a href="login.html" class="small ms-1">Přihlásit se</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Patička -->
    <footer class="bg-dark text-white py-3">
        <div class="container">
            <p class="text-center text-muted small mb-0">&copy; 2025 Messenger. Vytvořeno pro výuku PHP.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
