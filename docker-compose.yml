services:
  db:
    image: mysql:8.0
    container_name: alfa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: alfadb
      MYSQL_DATABASE: alfa24
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "33061:3306"
    networks:
      - alfa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    build: ./docker/build/
    container_name: alfa-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/var/www/html/
    ports:
      - "80:80"
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    networks:
      - alfa-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: alfa-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: alfadb
      UPLOAD_LIMIT: 1G
    ports:
      - "8301:80"
    networks:
      - alfa-network

networks:
  alfa-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
